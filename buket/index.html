<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Bouquet Card</title>
    <meta
      name="description"
      content="Tampilan bouquet bunga digital dengan kartu ucapan yang bisa dibagikan lewat link."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/flower.css" />
    <link rel="stylesheet" href="../styles/animation.css" />
    <link rel="stylesheet" href="../styles/index.css" />
    <script src="../scripts/options.js" defer></script>
    <script src="../scripts/index.js" defer></script>
  </head>
  <body data-page="bouquet" data-theme="peach">
    <main class="page page-bouquet">
      <section class="bouquet-layout bouquet-layout-single">
        <article class="panel bouquet-stage-wrap">
          <div class="bouquet-stage" aria-label="Susunan buket bunga">
            <div id="petalRain" class="petal-rain" aria-hidden="true"></div>
            <svg
              id="bouquetStemCanvas"
              class="bouquet-stem-canvas"
              viewBox="0 0 100 100"
              preserveAspectRatio="none"
              aria-hidden="true"
            ></svg>
            <div id="bouquetCanvas" class="bouquet-canvas"></div>
          </div>

          <section class="hanging-letter">
            <p class="eyebrow">A Bouquet For</p>
            <h1 id="toName">Sahabat Tersayang</h1>
            <p id="messageText"></p>
            <p class="signature">Dengan hangat, <span id="fromName"></span></p>
            <p id="bloomMeta" class="bloom-meta"></p>

            <div class="button-row">
              <a id="editLink" href="../index.html" class="button-soft">Custom Ulang</a>
              <button id="copyShareButton" type="button">Copy Link</button>
            </div>
          </section>
        </article>
      </section>
    </main>
  </body>
</html>
