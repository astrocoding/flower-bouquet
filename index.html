<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bloom Letter Studio | Custom Bouquet Card</title>
    <meta
      name="description"
      content="Buat kartu ucapan buket bunga yang bisa di-custom dan dibagikan lewat link."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/flower.css" />
    <link rel="stylesheet" href="./styles/animation.css" />
    <link rel="stylesheet" href="./styles/index.css" />
    <script src="./scripts/options.js" defer></script>
    <script src="./scripts/index.js" defer></script>
  </head>
  <body data-page="customizer" data-theme="peach">
    <main class="page page-customizer">
      <header class="hero">
        <p class="eyebrow">Bloom Letter Studio</p>
        <h1>Rangkai Buket Digital + Kartu Ucapan</h1>
        <p class="subtitle">
          Pilih bunga favoritmu, isi ucapan personal, lalu bagikan hasilnya.
        </p>
      </header>

      <section class="customizer-layout">
        <article class="panel panel-form">
          <h2>Detail Kartu</h2>

          <label class="field-label" for="recipientInput">Nama Penerima</label>
          <input id="recipientInput" type="text" placeholder="Contoh: Zen" maxlength="60" />

          <label class="field-label" for="senderInput">Nama Pengirim</label>
          <input id="senderInput" type="text" placeholder="Contoh: Dari Alfi" maxlength="60" />

          <label class="field-label" for="messageInput">Ucapan</label>
          <textarea id="messageInput" rows="5" maxlength="260"></textarea>

          <label class="field-label" for="themeInput">Tema Warna</label>
          <select id="themeInput"></select>

          <div id="themeQuickPick" class="theme-quick-pick" aria-label="Tema cepat"></div>

          <label class="field-label" for="shareLink">Link Shareable</label>
          <input id="shareLink" type="text" readonly />

          <div class="button-row">
            <button id="previewButton" type="button">Preview Bouquet</button>
            <button id="copyButton" type="button" class="button-soft">Copy Link</button>
          </div>

          <a class="text-link" href="./buket" target="_blank" rel="noopener noreferrer"
            >Buka contoh halaman bouquet</a
          >
        </article>

        <article class="panel panel-picker">
          <div class="picker-head">
            <h2>Pilih 6-10 Bunga</h2>
            <p>Total: <strong id="totalValue">0</strong>/10</p>
          </div>

          <p id="selectionHelper" class="picker-helper">
            Rekomendasi: 6-10 bunga untuk susunan buket yang lebih cantik.
          </p>

          <div id="flowerPicker" class="flower-picker" aria-label="Daftar bunga"></div>

          <div id="selectionChips" class="selection-chips" aria-live="polite"></div>
        </article>
      </section>
    </main>
  </body>
</html>
